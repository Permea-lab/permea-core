sources:
  - source_id: b3pdb
    source_name: B3PDB
    delivery_axis: blood-brain barrier
    biological_scope: blood-brain barrier penetrating peptides
    likely_data_type: peptide sequences, source-defined BBB labels, structural/source annotations, literature/source metadata
    acquisition_mode: manual-source-card
    license_access_status: to verify
    redistribution_risk: no redistribution until source terms are confirmed
    provenance_strength: medium-to-high if original source identifiers, papers, labels, and evidence context are preserved
    benchmark_mapping:
      - bbb_b3pred_dataset3
      - future BBB peptide benchmark candidates
    priority: high
    current_status: source-carded
    next_action: verify current access path, license/access terms, citation metadata, and fields available for review
    limitations:
      - source context requires review
      - labels are source-defined benchmark labels
      - redistribution status is not confirmed
    claim_boundary: source inventory metadata only; does not claim data download, redistribution permission, wet-lab validation, or benchmark readiness
    source_file: sources/b3pdb.yaml
  - source_id: brainpeps
    source_name: BrainPeps
    delivery_axis: blood-brain barrier
    biological_scope: BBB peptide transport evidence
    likely_data_type: peptide records, BBB transport labels, positive and negative source records where available, assay and literature context
    acquisition_mode: manual-source-card
    license_access_status: to verify
    redistribution_risk: no redistribution until source terms are confirmed
    provenance_strength: high if label polarity, assay context, PMID/DOI, and source method are preserved
    benchmark_mapping:
      - BBB peptide benchmark candidates
      - evidence-card support
    priority: high
    current_status: source-carded
    next_action: verify database availability, field definitions, export posture, and license/access terms
    limitations:
      - source availability and export mode require review
      - assay contexts may vary
      - source labels should not be generalized beyond their source context
    claim_boundary: source inventory metadata only; benchmark use requires reviewed access, license, provenance, and label policy
    source_file: sources/brainpeps.yaml
  - source_id: b3pred_dataset3
    source_name: B3Pred Dataset 3
    delivery_axis: blood-brain barrier
    biological_scope: benchmark-oriented BBB peptide classification surface
    likely_data_type: peptide sequences and source-defined benchmark labels
    acquisition_mode: no-redistribution-source-card-only
    license_access_status: source attribution and redistribution require review
    redistribution_risk: no redistribution until original source and construction policy are confirmed
    provenance_strength: medium if source construction notes, label policy, and lineage are preserved
    benchmark_mapping:
      - bbb_b3pred_dataset3
    priority: high
    current_status: benchmark-mapped
    next_action: trace the source citation and construction policy, then draft a dataset card proposal
    limitations:
      - current benchmark scaffold does not confirm source access
      - current benchmark scaffold does not confirm license or redistribution rights
    claim_boundary: source-to-benchmark mapping metadata only; does not assert row-level data is present or redistributable
    source_file: sources/b3pred_dataset3.yaml
  - source_id: cppsite2
    source_name: CPPsite 2.0
    delivery_axis: cell penetration / membrane penetration
    biological_scope: experimentally reported cell-penetrating peptides
    likely_data_type: peptide sequences, CPP annotations, cargo/context notes, modifications, literature metadata
    acquisition_mode: manual-source-card
    license_access_status: to verify
    redistribution_risk: no redistribution until source terms are confirmed
    provenance_strength: high if source entry identifiers, citations, cargo, modification, and assay fields are preserved
    benchmark_mapping:
      - cpp_cppsite2_placeholder
      - future CPP prototype benchmark task
    priority: medium
    current_status: source-carded
    next_action: verify current access path, license/access terms, field schema, and original CPPsite lineage value
    limitations:
      - likely positive/source-membership oriented
      - negative sampling risk must be addressed before benchmark use
    claim_boundary: source inventory metadata only; CPP benchmark use requires reviewed source terms and label policy
    source_file: sources/cppsite2.yaml
  - source_id: deeploc
    source_name: DeepLoc dataset / DeepLoc service documentation
    delivery_axis: localization proxy
    biological_scope: eukaryotic protein subcellular localization
    likely_data_type: protein sequences, subcellular localization labels, sorting-signal labels where available, source accessions
    acquisition_mode: no-redistribution-source-card-only
    license_access_status: to verify for dataset redistribution
    redistribution_risk: no redistribution until dataset license and terms are confirmed
    provenance_strength: medium-to-high if accession, evidence code, localization label, and split origin are preserved
    benchmark_mapping:
      - localization / targeting proxy roadmap
    priority: medium
    current_status: source-carded
    next_action: verify dataset availability, license/access terms, label schema, and proxy-task wording
    limitations:
      - proxy task only
      - localization labels do not prove delivery, transport, cargo uptake, or therapeutic effect
    claim_boundary: proxy-source metadata only; does not claim direct delivery evidence or benchmark readiness
    source_file: sources/deeploc.yaml
  - source_id: uniprot_subcellular_location
    source_name: UniProt subcellular location annotations
    delivery_axis: localization proxy
    biological_scope: curated protein subcellular location and topology annotations
    likely_data_type: protein accessions, sequences, location annotations, topology annotations, evidence/provenance fields
    acquisition_mode: api-metadata-to-verify
    license_access_status: to verify from current UniProt license and terms
    redistribution_risk: no redistribution until current terms and record-level attribution requirements are confirmed
    provenance_strength: high if accession, release, annotation evidence, location vocabulary, and citation fields are preserved
    benchmark_mapping:
      - localization / targeting proxy roadmap
      - evidence-card support
    priority: medium
    current_status: source-carded
    next_action: verify license/access terms, retrieval mode, release/version recording, and evidence-code policy
    limitations:
      - proxy task only
      - annotations may mix evidence strengths
      - should not be treated as direct delivery labels
    claim_boundary: source inventory metadata only; future retrieval and reuse require terms review
    source_file: sources/uniprot_subcellular_location.yaml
  - source_id: pubmed_evidence
    source_name: PubMed / NCBI literature metadata
    delivery_axis: literature evidence graph
    biological_scope: delivery-related publications and source citations
    likely_data_type: bibliographic metadata, PMID, DOI, title, abstract where permitted, publication type, full-text links where available
    acquisition_mode: literature-metadata
    license_access_status: metadata access public; abstract and full-text reuse require copyright and source review
    redistribution_risk: no redistribution of article text unless record-level rights permit it
    provenance_strength: high for citation-level provenance; content reuse varies by record
    benchmark_mapping:
      - evidence cards for BBB, CPP, localization, and benchmark source claims
    priority: high
    current_status: source-carded
    next_action: define citation metadata fields and copyright-safe extraction policy before automated use
    limitations:
      - PubMed is an index and citation source
      - PubMed does not itself grant reuse rights for all linked content
      - extracted claims require separate evidence-card review
    claim_boundary: citation and evidence-source metadata only; does not grant text reuse rights or validate extracted claims
    source_file: sources/pubmed_evidence.yaml
