benchmarks:
  - benchmark_id: bbb_b3pred_dataset3
    task_name: bbb_peptide_prioritization_v1
    delivery_context: blood_brain_barrier_peptide_prioritization
    maturity_level: baseline-ready
    dataset_card: benchmarks/bbb_b3pred_dataset3.yaml
    benchmark_task_spec: docs/specs/BENCHMARK_TASK_SPEC.md
    split_policy:
      method: stratified_kfold
      leakage_checks:
        - exact_sequence_duplicate_check
        - source_group_review
    metrics:
      primary: pr_auc
      secondary:
        - roc_auc
        - mcc
        - f1
    baseline_models:
      - dummy
      - logistic_regression
      - random_forest
    output_artifacts:
      - metrics.json
      - ranking.csv
      - manifest.yaml
      - benchmark_card.md
      - evidence_cards.json
    limitations:
      - source_attribution_and_redistribution_require_review
      - labels_are_source_defined_benchmark_labels
      - benchmark_results_do_not_prove_transport_or_mechanism
    claim_boundary: "Computational benchmark evidence only; supports candidate prioritization before wet-lab work."
  - benchmark_id: cpp_cppsite2_placeholder
    task_name: cpp_membrane_penetration_placeholder_v1
    delivery_context: cell_penetrating_peptide_membrane_penetration
    maturity_level: proposed
    dataset_card: benchmarks/cpp_cppsite2_placeholder.yaml
    benchmark_task_spec: docs/specs/BENCHMARK_TASK_SPEC.md
    split_policy:
      method: to_be_defined
      leakage_checks:
        - exact_sequence_duplicate_check
        - source_context_review
    metrics:
      primary: to_be_defined
      secondary:
        - roc_auc
        - pr_auc
        - mcc
    baseline_models:
      - dummy
      - logistic_regression
    output_artifacts:
      - metrics.json
      - ranking.csv
      - manifest.yaml
      - benchmark_card.md
      - evidence_cards.json
    limitations:
      - dataset_card_needed
      - source_context_and_label_policy_require_review
      - placeholder_entry_not_a_completed_benchmark
    claim_boundary: "Proposed computational benchmark surface only; no wet-lab, clinical, universal, or solved-delivery claim."
